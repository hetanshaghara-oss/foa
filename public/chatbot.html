<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17171a;
      --surface2: #1e1e22;
      --border: rgba(255,255,255,0.07);
      --accent: #10b981;
      --accent-glow: rgba(16,185,129,0.2);
      --text: #f0eff4;
      --text-muted: #888897;
      --user-bubble: #10b981;
      --ai-bubble: #1e1e22;
      --radius: 18px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Header ---- */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .logo svg { width: 20px; height: 20px; fill: white; }
    .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .header-info p  { font-size: 12px; color: var(--text-muted); }
    .status-dot {
      width: 7px; height: 7px;
      background: #294fa2;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ---- Model badge in header ---- */
    .model-badge {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--accent);
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ---- Chat area ---- */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .message-row {
      display: flex;
      padding: 0 20px;
      animation: fadeUp 0.25s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message-row.user { justify-content: flex-end; }
    .message-row.ai   { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message-row.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message-row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* ---- Typing indicator ---- */
    .typing-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ---- Welcome screen ---- */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
      padding: 40px 20px;
      text-align: center;
    }
    #welcome .big-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #14a3c0, #1471a7);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px var(--accent-glow);
    }
    #welcome .big-icon svg { width: 34px; height: 34px; fill: white; }
    #welcome h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    #welcome p  { font-size: 14px; color: var(--text-muted); max-width: 320px; line-height: 1.6; }

    .powered {
      font-size: 12px;
      color: var(--accent);
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 20px;
      padding: 4px 14px;
      font-family: var(--mono);
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
    }
    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .suggestion-btn:hover {
      border-color: var(--accent);
      background: rgba(16,185,129,0.08);
    }

    /* ---- Input area ---- */
    .input-wrap {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-inner {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }
    .input-inner:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 2px 0;
    }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    #send-btn:hover   { opacity: 0.85; }
    #send-btn:active  { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; fill: white; }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
  </div>
  <div class="header-info">
    <h1>AI Assistant</h1>
    <p><span class="status-dot"></span>Powered by OpenRouter</p>
  </div>
  <span class="model-badge" id="model-label">loading...</span>
</header>

<!-- Chat -->
<div id="chat">
  <div id="welcome">
    <div class="big-icon">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    </div>
    <h2>How can I help you?</h2>
    <p>Ask me anything — powered by OpenRouter with free AI models.</p>
    <span class="powered" id="welcome-model">✦ OpenRouter — Free Models</span>
    <div class="suggestions">
      <button class="suggestion-btn">Explain quantum computing</button>
      <button class="suggestion-btn">Write a Python function</button>
      <button class="suggestion-btn">Summarize a topic</button>
      <button class="suggestion-btn">Give me a recipe idea</button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-wrap">
  <div class="input-inner">
    <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
